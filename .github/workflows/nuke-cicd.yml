name: Nuke CICD Pipeline
on:
  push:
    branches:
    - prerelease
    - master
    tags:
    - bump-*
  pull_request:
    branches:
    - '**'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  PRE_SETUP:
    name: Pre Setup
    runs-on:
      labels: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true
        submodules: recursive
        persist-credentials: true
    - id: NUKE_RUN
      name: Run Nuke PipelinePreSetup
      run: chmod +x ./build.sh && ./build.sh PipelinePreSetup
    timeout-minutes: 30
    outputs:
      NUKE_PRE_SETUP: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP }}
      NUKE_PRE_SETUP_OUTPUT_TEST_MATRIX: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP_OUTPUT_TEST_MATRIX }}
      NUKE_PRE_SETUP_OUTPUT_BUILD_MATRIX: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP_OUTPUT_BUILD_MATRIX }}
      NUKE_PRE_SETUP_OUTPUT_PUBLISH_MATRIX: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP_OUTPUT_PUBLISH_MATRIX }}
      NUKE_PRE_SETUP_NET_CONDUIT_TEST_CONDITION: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP_NET_CONDUIT_TEST_CONDITION }}
      NUKE_PRE_SETUP_NET_CONDUIT_TEST_RUNS_ON: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP_NET_CONDUIT_TEST_RUNS_ON }}
      NUKE_PRE_SETUP_NET_CONDUIT_TEST_RUN_SCRIPT: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP_NET_CONDUIT_TEST_RUN_SCRIPT }}
      NUKE_PRE_SETUP_NET_CONDUIT_TEST_CACHE_KEY: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP_NET_CONDUIT_TEST_CACHE_KEY }}
      NUKE_PRE_SETUP_NET_CONDUIT_TEST_CACHE_RESTORE_KEY: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP_NET_CONDUIT_TEST_CACHE_RESTORE_KEY }}
      NUKE_PRE_SETUP_NET_CONDUIT_TEST_CACHE_MAIN_RESTORE_KEY: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP_NET_CONDUIT_TEST_CACHE_MAIN_RESTORE_KEY }}
      NUKE_PRE_SETUP_NET_CONDUIT_TEST_CHECKOUT_FETCH_DEPTH: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP_NET_CONDUIT_TEST_CHECKOUT_FETCH_DEPTH }}
      NUKE_PRE_SETUP_NET_CONDUIT_TEST_CHECKOUT_FETCH_TAGS: ${{ steps.NUKE_RUN.outputs.NUKE_PRE_SETUP_NET_CONDUIT_TEST_CHECKOUT_FETCH_TAGS }}
